services:
  - type: web
    name: code-agent
    runtime: docker
    region: ohio
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/app.db
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: "*"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
