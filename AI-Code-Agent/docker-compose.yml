version: '3.9'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ai_code_agent
    ports:
      - '3306:3306'
  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/ai_code_agent
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - db
    ports:
      - '8000:8000'
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '5173:5173'
